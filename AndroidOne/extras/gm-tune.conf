# GM5 sunucu — CPU + ZRAM + EKRAN tek ayar.  Duzenle + reboot.  -> /data/adb/gm-tune.conf
# Bos birak = ROM varsayilanina dokunma.
#
# === CPU idle taban frekansi ===
# hw=donanim min (en az guc) | sayi=kHz sabitle (orn 960000) | bos=dokunma
LITTLE_MIN=hw
BIG_MIN=hw

# === Bostaki acik cekirdek (0-4).  Dusuk=pil, Yuksek=tepkisel ===
# Ekran/YouTube takiliyorsa BIG_MIN_CPUS=1 dene.
LITTLE_MIN_CPUS=1
BIG_MIN_CPUS=0

# === ZRAM boyutu MB (orn 2048=2GB, 1280=1.25GB).  bos=init.zram.rc'deki (2GB) kalir ===
ZRAM_MB=

# === Swappiness 0-200 (zram hizli; 60-100 makul).  bos=dokunma ===
SWAPPINESS=

# === Ekran cozunurlugu + DPI (ayri ayri ayarla) ===
# Bos birak = stok (1080x1920 @ dpi 320), dokunma.
# Render olcekleme: panel hep 1080p tarar; bu sadece UI/render cozunurlugu.
# Ornek hafif: 810x1440 @ 240dpi.  Istedigin degeri ver (en-boy 9:16 onerilir; dpi ~ W/1080*320).
# Canli dene (reboot'suz):  sh /data/adb/service.d/91-gm-tune.sh res 810 1440 240
#                  stok'a don:  sh /data/adb/service.d/91-gm-tune.sh res reset
# 0616 prebuilt ZATEN 810p yapiyor + dokunmatik dead-zone riski -> RES'e dokunma (bos birak).
RES_W=
RES_H=
RES_DPI=
